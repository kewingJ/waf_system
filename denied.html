<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <title>Access Denied</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { font-family: Arial, sans-serif; background:#0f172a; color:#e5e7eb; margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px; }
    .layout { display:flex; flex-direction:column; align-items:center; gap:28px; width:100%; }
    .logo { width:200px; max-width:60vw; display:block; }
    .box { max-width:720px; width:100%; padding:40px; background:#111827; border:1px solid #374151; border-radius:12px; text-align:center; box-sizing:border-box; }
    h1 { margin-top:0; color:#f87171; }
    p { line-height:1.6; }
  </style>
</head>
<body>
  <div class="layout">
    <img src="https://reportwui.netsoluciones.com/img/logo.png" alt="Logo" class="logo">
    <div class="box">
      <h1>Access Denied</h1>
      <p>Tu direccion IP no esta autorizada para acceder a este recurso.</p>
      <p>Si crees que esto es un error, contacta al administrador del sistema.</p>
    </div>
  </div>
</body>
</html>
