<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Blocked For Attack Detected</title>
  <style>
    /* Reiniciar márgenes y paddings por defecto */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background-color: #fff;
      color: #333;
    }

    /* Barra superior oscura */
    .header {
      background-color: #151936;
      height: 60px;
      width: 100%;
    }

    /* Contenedor principal */
    .content {
      text-align: center;
      padding: 60px 20px;
    }

    /* Imagen (icono) centrado */
    .icon {
      width: 150px; /* ajusta el tamaño si lo deseas */
      height: 150px;
      border-radius: 50%; /* si la imagen ya es circular, puedes quitar esto */
      object-fit: cover;
      margin-bottom: 20px;
    }

    /* Texto principal */
    .main-text {
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 10px;
    }

    /* Opcional: subtítulo (si lo deseas) */
    .subtitle {
      font-size: 16px;
      color: #777;
    }
  </style>
</head>
<body>

  <!-- Barra superior -->
  <div class="header"></div>

  <!-- Contenido central -->
  <div class="content">
    <!-- Sustituye la ruta de la imagen por la tuya -->
    <img 
      src="img/logo.png"
      alt="Ícono de seguridad" 
      class="icon"
    />
    <div class="main-text">Blocked For Attack Detected</div>
    <!-- Agrega un subtítulo u otro texto si lo necesitas -->
    <!-- <div class="subtitle">Netfrontweb o lo que desees</div> -->
  </div>

</body>
</html>
